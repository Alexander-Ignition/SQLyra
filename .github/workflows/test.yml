name: Test
on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  Apple:
    name: Test ${{ matrix.name }}
    runs-on: macOS-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            target: build/test-macos.xcresult
          - name: iOS
            target: build/test-ios.xcresult
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and test
        run: make ${{ matrix.target }}
        shell: bash
  SPM:
    name: Test with SPM
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and test
        run: swift test
        shell: bash
  Snippets:
    name: Build and run snippets
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and run snippets
        run: make run-snippets
        shell: bash
  Linux:
    name: Test Linux
    runs-on: ubuntu-latest
    container:
      image: swift:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install SQLite
        run: apt-get update && apt-get install -y libsqlite3-dev
      - name: Build and test
        run: swift test
  Lint:
    runs-on: macOS-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: swift-format lint
        run: make lint 2>&1 | Scripts/gh-format.swift
        shell: bash
